<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narozeninová výzva 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d98a;
    --gold-dark: #8a6a1f;
    --cream: #faf7f0;
    --dark: #1a1410;
    --mid: #4a3f2f;
    --border: rgba(201,168,76,0.3);
    --radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 50%);
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  .screen { display: none; animation: fadeIn 0.4s ease; }
  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* START */
  .start-icon {
    font-size: 64px;
    text-align: center;
    margin-bottom: 1.5rem;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--gold-light);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 0.75rem;
  }

  .subtitle {
    text-align: center;
    color: rgba(250,247,240,0.6);
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  /* PROGRESS */
  .progress-bar {
    background: rgba(201,168,76,0.15);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(250,247,240,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  /* QUESTION CARD */
  .question-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .question-card p {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    line-height: 1.5;
    color: var(--cream);
    margin-bottom: 0.5rem;
  }

  .q-hint {
    font-size: 13px;
    color: rgba(250,247,240,0.45);
    font-weight: 300;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }

  .opt-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 13px 18px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s ease;
    width: 100%;
  }

  .opt-btn:hover:not(:disabled) {
    background: rgba(201,168,76,0.12);
    border-color: rgba(201,168,76,0.5);
    transform: translateX(4px);
  }

  .opt-btn.correct {
    background: rgba(80,180,100,0.15);
    border-color: rgba(80,180,100,0.6);
    color: #90e8a0;
  }

  .opt-btn.wrong {
    background: rgba(220,80,80,0.12);
    border-color: rgba(220,80,80,0.4);
    color: #f09090;
  }

  /* FEEDBACK */
  .feedback {
    display: none;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    margin-bottom: 1rem;
    line-height: 1.5;
  }
  .feedback.ok {
    background: rgba(80,180,100,0.12);
    border: 1px solid rgba(80,180,100,0.3);
    color: #90e8a0;
  }
  .feedback.fail {
    background: rgba(220,80,80,0.1);
    border: 1px solid rgba(220,80,80,0.3);
    color: #f09090;
  }

  /* BUTTONS */
  .btn {
    display: inline-block;
    background: var(--gold);
    color: var(--dark);
    border: none;
    border-radius: var(--radius);
    padding: 13px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.02em;
  }
  .btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--cream);
    opacity: 0.7;
  }
  .btn-outline:hover { background: rgba(255,255,255,0.06); opacity: 1; }

  .btn-row { display: flex; justify-content: flex-end; gap: 10px; }

  /* RESULT */
  .result-number {
    font-family: 'Playfair Display', serif;
    font-size: 7rem;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    line-height: 1;
    margin: 1rem 0;
    text-shadow: 0 0 40px rgba(201,168,76,0.4);
    animation: glow 2s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { text-shadow: 0 0 20px rgba(201,168,76,0.3); }
    to { text-shadow: 0 0 60px rgba(201,168,76,0.7); }
  }

  .invitation-card {
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin: 1.5rem 0;
    font-size: 15px;
    line-height: 1.8;
    color: var(--cream);
  }

  .invitation-card .inv-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
    font-weight: 500;
  }

  .score-breakdown {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
  }
  .score-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(201,168,76,0.3);
  }
  .score-dot.filled { background: var(--gold); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }
</style>
</head>
<body>
<div class="container">

  <!-- START -->
  <div class="screen active" id="screen-start">
    <div class="start-icon">🎂</div>
    <h1>Uhodni moje tajemství</h1>
    <p class="subtitle">Pět otázek. Každá správná odpověď prozradí kousek záhady.<br>Co ti vyjde na konci?</p>
    <div style="text-align:center;">
      <button class="btn" onclick="startGame()">Spustit výzvu</button>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen" id="screen-game">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="q-meta">
      <span>Otázka <span id="q-num">1</span> z 5</span>
      <span>Skóre: <span id="score-live">0</span></span>
    </div>
    <div class="question-card">
      <p id="question-text"></p>
      <span class="q-hint" id="question-hint"></span>
    </div>
    <div class="options" id="options-container"></div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row" id="next-wrap" style="display:none;">
      <button class="btn" onclick="nextQuestion()">Další →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div style="text-align:center;">
      <p style="font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); margin-bottom:0.5rem;">Tvůj výsledek</p>
      <div class="result-number" id="final-score">58</div>
      <div class="score-breakdown" id="score-dots"></div>
      <p style="font-size:13px; color:rgba(250,247,240,0.45); margin-bottom:0;">správných odpovědí: <span id="correct-count">0</span> z 5</p>
    </div>
    <hr class="divider">
    <div class="invitation-card">
      <div class="inv-label">✉ Pozvánka</div>
      <span id="invitation-text"></span>
    </div>
    <div style="text-align:center;">
      <button class="btn-outline btn" onclick="restartGame()">Hrát znovu</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    text: "Kolik let trvá jeden Saturnův oběh kolem Slunce?",
    hint: "Největší planeta sluneční soustavy s prstenci.",
    options: ["29 let", "58 let", "84 let", "165 let"],
    correct: 1,
    points: 10,
    feedbackOk: "Přesně tak! Saturn oběhne Slunce jednou za přibližně 29 let — a já za tu dobu stihnu dvakrát slavit!",
    feedbackFail: "Správně je 29 let. Saturn je druhá největší planeta — a oběhne Slunce jednou za 29 pozemských let."
  },
  {
    text: "Kolik kláves má standardní klavír?",
    hint: "Bílé i černé dohromady — Frederick Chopin to věděl nazpaměť.",
    options: ["52", "61", "76", "88"],
    correct: 3,
    points: 12,
    feedbackOk: "Výborně! 88 kláves — z toho 52 bílých a 36 černých.",
    feedbackFail: "Správná odpověď je 88. Klavír má 52 bílých a 36 černých kláves."
  },
  {
    text: "Který rok označuje číslo LVIII v římských číslicích?",
    hint: "L = 50, V = 5, III = 3... sečti!",
    options: ["48", "58", "68", "78"],
    correct: 1,
    points: 15,
    feedbackOk: "Správně! L(50) + V(5) + III(3) = 58. Řím nezradil.",
    feedbackFail: "Správně je 58. L = 50, V = 5, III = 3 → dohromady 58."
  },
  {
    text: "Ve které zemi se nachází pohoří Kilimandžáro?",
    hint: "Nejvyšší hora Afriky — 5 895 metrů nad mořem.",
    options: ["Keňa", "Uganda", "Tanzanie", "Etiopie"],
    correct: 2,
    points: 11,
    feedbackOk: "Perfektně! Kilimandžáro leží v Tanzanii a je nejvyšší horou celé Afriky.",
    feedbackFail: "Kilimandžáro se nachází v Tanzanii, nedaleko hranic s Keňou."
  },
  {
    text: "Kolik minut trvá slavný film \"Úžasňákovi\" (The Incredibles)?",
    hint: "Pixar, rok 2004 — superhrdinská rodinka v akci.",
    options: ["95 min", "106 min", "115 min", "124 min"],
    correct: 1,
    points: 10,
    feedbackOk: "Přesně! Film trvá 115 minut — ale to k 58 nevede... nebo vede? Uvidíš na konci! 😉",
    feedbackFail: "Správně je 115 minut. Ale číslo 58 se skrývá jinde — uvidíš na konci!"
  }
];

const MAGIC = 58;
let current = 0;
let totalScore = 0;
let correctCount = 0;

function startGame() {
  current = 0; totalScore = 0; correctCount = 0;
  show('screen-game');
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  const pct = (current / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('score-live').textContent = totalScore;
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('question-hint').textContent = q.hint;
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-wrap').style.display = 'none';

  const c = document.getElementById('options-container');
  c.innerHTML = '';
  q.options.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = opt;
    b.onclick = () => selectAnswer(i);
    c.appendChild(b);
  });
}

function selectAnswer(index) {
  const q = questions[current];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';

  if (index === q.correct) {
    btns[index].classList.add('correct');
    totalScore += q.points;
    correctCount++;
    fb.className = 'feedback ok';
    fb.textContent = q.feedbackOk;
  } else {
    btns[index].classList.add('wrong');
    btns[q.correct].classList.add('correct');
    fb.className = 'feedback fail';
    fb.textContent = q.feedbackFail;
  }

  document.getElementById('score-live').textContent = totalScore;
  const nw = document.getElementById('next-wrap');
  nw.style.display = 'flex';
  if (current === questions.length - 1) {
    nw.querySelector('button').textContent = 'Odhalit tajemství 🎂';
  }
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('progress-fill').style.width = '100%';
  const maxPossible = questions.reduce((s,q) => s+q.points, 0);
  const displayed = MAGIC;

  document.getElementById('final-score').textContent = displayed;
  document.getElementById('correct-count').textContent = correctCount;

  const dots = document.getElementById('score-dots');
  dots.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'score-dot' + (i < correctCount ? ' filled' : '');
    dots.appendChild(d);
  }

  const invitations = [
    `Přišel si na to? Číslo 58 je můj věk — a právě ho slavím! 🎉\n\nSrdečně tě zvu na narozeninovou párty. Konkrétně 29. dubna 2026 od 9:30 v kabinetu fyziky. Občerstvení zajištěno, dobrou náladu s sebou! Těším se na tebe!`,
    `58 — přesně tolik mi bude! A ty jsi to odhalil/a jako detektiv. 🕵️\n\nZa odměnu tě zvu na narozeninovou oslavu. Konkrétně 29. dubna 2026 od 9:30 v kabinetu fyziky. Občerstvení zajištěno, dobrou náladu s sebou!`,
    `Tajemství je odhaleno — slavím 58 let! 🎂\n\nA Srdečně tě zvu na narozeninovou párty. Konkrétně 29. dubna 2026 od 9:30 v kabinetu fyziky. Občerstvení zajištěno, dobrou náladu s sebou! Těším se na tebe!`
  ];

  document.getElementById('invitation-text').textContent = invitations[correctCount >= 4 ? 0 : correctCount >= 2 ? 1 : 2];
  show('screen-result');
}

function restartGame() { startGame(); }

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
